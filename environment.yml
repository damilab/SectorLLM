name: sector
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # PyTorch with CUDA
      - torch>=2.0.0
      - torchvision
      - torchaudio

      # vLLM for inference
      - vllm>=0.4.0

      # Data processing
      - pandas
      - numpy

      # Transformers & tokenizers
      - transformers
      - tokenizers
      - sentencepiece

      # Visualization
      - matplotlib
      - seaborn

      # Finance data
      - yfinance

      # Config & utilities
      - pyyaml
      - tqdm
